name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check skill template sync
        run: bash scripts/sync-skill-templates.sh --check

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage
