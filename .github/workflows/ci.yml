name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check skill template sync
        run: bash scripts/sync-skill-templates.sh --check

      - name: Check EXP-03 version pins
        run: |
          PKG_VERSION=$(node -p "require('./packages/chorus-skill/package.json').version")
          STALE=$(grep -n '@chorus-protocol/skill@[0-9]' docs/experiments/EXP-03-human-developer-cold-start.md | grep -v "@${PKG_VERSION}" || true)
          if [ -n "$STALE" ]; then
            echo "STALE version pins in EXP-03 (expected @${PKG_VERSION}):"
            echo "$STALE"
            exit 1
          fi
          echo "EXP-03 version pins match package.json ($PKG_VERSION)"

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage
