app = "chorus-alpha"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  CHORUS_MAX_AGENTS = "100"
  CHORUS_MAX_BODY_BYTES = "65536"
  CHORUS_RATE_LIMIT_PER_MIN = "60"
  CHORUS_RATE_LIMIT_PER_KEY_MIN = "120"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
